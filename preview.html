<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Preview — DTI Laguna Provincial Office Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=open-sauce-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root {
    --navy: #1c3f94;
    --navy-dark: #16306f;
    --red: #e3231f;
    --yellow: #ffd400;
    --white: #ffffff;
    --field-border: #1c3f94;
    --font-display: 'Anton', sans-serif;
    --font-body: 'Open Sauce Sans', 'Segoe UI', Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; background:var(--white); font-family:var(--font-body); }
.login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--white); padding:24px 16px; }
.canvas { position:relative; width:min(96vw,1100px); aspect-ratio:1057/614; margin:0 auto; overflow:hidden; }
.bar { position:absolute; left:0; right:0; height:1.6%; background:var(--navy); z-index:1; }
.bar-top { top:23.6%; }
.bar-bottom { top:61%; }
.sparkle { position:absolute; color:var(--navy); opacity:.06; font-size:28px; z-index:0; user-select:none; }
.sparkle-1 { top:14%; left:86%; font-size:22px; }
.sparkle-2 { top:47%; left:95%; font-size:16px; }
.sparkle-3 { top:70%; left:90%; font-size:26px; }
.watermark { position:absolute; top:38%; left:86%; transform:translate(-50%,-50%) rotate(90deg); font-family:var(--font-display); font-size:clamp(60px,9vw,110px); color:var(--navy); opacity:.045; z-index:0; pointer-events:none; white-space:nowrap; }
.brand { position:absolute; left:18%; top:24%; width:30%; z-index:2; display:flex; flex-direction:column; align-items:center; text-align:center; }
.brand-logo { width:78%; position:relative; margin-bottom:4%; }
.dti-mark { width:100%; display:block; overflow:visible; }
.dti-letters { font-family:'Arial Black', var(--font-body); font-weight:900; font-size:92px; fill:var(--navy); letter-spacing:-4px; }
.dti-rule { display:block; width:100%; height:6px; margin-top:6%; background:linear-gradient(to right, var(--navy) 0 70%, var(--red) 70% 100%); }
.brand-text { margin:10% 0 0 0; font-family:var(--font-body); font-weight:800; font-size:clamp(14px,1.9vw,21px); line-height:1.35; color:var(--navy); letter-spacing:.5px; }
.login-card { position:absolute; left:55%; top:12.5%; width:35.5%; height:70%; min-width:280px; background:var(--white); border-radius:26px; z-index:3;
    box-shadow: 0 18px 40px rgba(28,63,148,.16), 0 4px 10px rgba(28,63,148,.08), inset 0 0 0 1px rgba(28,63,148,.35);
    padding:6% 8% 5%; display:flex; flex-direction:column; }
.login-title { font-family:var(--font-display); font-weight:400; font-size:clamp(34px,4.6vw,52px); text-align:center; margin:0 0 8%; line-height:1; letter-spacing:1px; }
.login-title .navy { color:var(--navy); }
.login-title .accent { color:var(--red); }
#loginForm { display:flex; flex-direction:column; flex:1; }
.field-group { margin-bottom:6%; position:relative; }
.field-group label { display:block; font-family:var(--font-body); font-weight:600; font-size:clamp(13px,1.4vw,16px); color:#1d2733; margin-bottom:6px; }
.text-input { width:100%; border:1.5px solid var(--field-border); border-radius:22px; padding:12px 18px; font-family:var(--font-body); font-size:clamp(13px,1.4vw,15px); color:#1d2733; outline:none; background:var(--white); transition:box-shadow .15s ease, border-color .15s ease; }
.text-input:focus { border-color:var(--navy-dark); box-shadow:0 0 0 3px rgba(28,63,148,.15); }
.text-input.input-error { border-color:var(--red); }
.field-error { display:block; color:var(--red); font-size:12px; margin-top:4px; min-height:14px; }
.forgot-link { display:block; text-align:center; margin-top:10px; font-size:clamp(11px,1.2vw,13px); color:#2a2a2a; text-decoration:none; }
.forgot-link:hover { text-decoration:underline; color:var(--navy); }
.btn-login { margin-top:auto; align-self:center; width:70%; min-width:160px; padding:14px 0; border:none; border-radius:30px; background:var(--navy); color:var(--white); font-family:var(--font-display); font-size:clamp(18px,2.2vw,24px); letter-spacing:1px; cursor:pointer; box-shadow:0 10px 20px rgba(28,63,148,.35); transition:transform .12s ease, box-shadow .12s ease, background .12s ease; }
.btn-login:hover { background:var(--navy-dark); transform:translateY(-1px); box-shadow:0 14px 24px rgba(28,63,148,.4); }
.btn-login:active { transform:translateY(0); box-shadow:0 6px 14px rgba(28,63,148,.3); }
.btn-login.shake { animation:shake .4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-6px);} 40%,80%{transform:translateX(6px);} }
@media (max-width:760px){
    .canvas{aspect-ratio:auto; height:auto;}
    .bar-top,.bar-bottom,.sparkle,.watermark{display:none;}
    .brand{position:static; width:100%; margin-bottom:28px;}
    .brand-logo{width:140px;}
    .login-card{position:static; width:100%; min-width:0; height:auto; padding:32px 24px 28px;}
}
</style>
</head>
<body>
<main class="login-page">
  <div class="canvas">
    <div class="bar bar-top"></div>
    <div class="bar bar-bottom"></div>
    <span class="sparkle sparkle-1" aria-hidden="true">&#10022;</span>
    <span class="sparkle sparkle-2" aria-hidden="true">&#10022;</span>
    <span class="sparkle sparkle-3" aria-hidden="true">&#10022;</span>
    <span class="watermark" aria-hidden="true">in</span>

    <section class="brand" aria-label="DTI Laguna Provincial Office">
      <div class="brand-logo">
        <svg class="dti-mark" viewBox="0 0 220 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DTI logo">
          <text x="0" y="108" class="dti-letters">dti</text>
          <g class="dti-badge" transform="translate(150, 6)">
            <circle cx="22" cy="22" r="22" fill="#1c3f94"></circle>
            <path d="M14 26 l4 -6 l3 3 l5 -8 l2 5 l-3 9 l-6 2 z" fill="#ffd400"></path>
            <circle cx="27" cy="14" r="2.4" fill="#ffd400"></circle>
          </g>
        </svg>
        <span class="dti-rule"></span>
      </div>
      <p class="brand-text">LAGUNA<br/>PROVINCIAL<br/>OFFICE</p>
    </section>

    <section class="login-card" aria-label="Login form">
      <h1 class="login-title"><span class="navy">Log</span><span class="accent">in</span></h1>
      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="username">Username</label>
          <input id="username" name="Username" class="text-input" autocomplete="username" />
          <span class="field-error"></span>
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input id="password" name="Password" type="password" class="text-input" autocomplete="current-password" />
          <span class="field-error"></span>
          <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-login">LOGIN</button>
      </form>
    </section>
  </div>
</main>
<script>
document.addEventListener("DOMContentLoaded", function () {
    var form = document.getElementById("loginForm");
    var usernameInput = document.getElementById("username");
    var passwordInput = document.getElementById("password");
    var loginButton = document.querySelector(".btn-login");
    var forgotLink = document.getElementById("forgotPasswordLink");

    form.addEventListener("submit", function (e) {
        e.preventDefault();
        var ok = validateRequired(usernameInput) && validateRequired(passwordInput);
        if (!ok) { shakeButton(); }
        else { window.alert("Demo only — wire this up to /Account/Login in the real project."); }
    });

    [usernameInput, passwordInput].forEach(function (input) {
        input.addEventListener("input", function () {
            input.classList.remove("input-error");
            input.parentElement.querySelector(".field-error").textContent = "";
        });
    });

    forgotLink.addEventListener("click", function (e) {
        e.preventDefault();
        window.alert("Please contact the DTI Laguna Provincial Office system administrator to reset your password.");
    });

    function validateRequired(input) {
        var errorSpan = input.parentElement.querySelector(".field-error");
        if (input.value.trim() === "") {
            input.classList.add("input-error");
            errorSpan.textContent = input.name + " is required.";
            return false;
        }
        input.classList.remove("input-error");
        errorSpan.textContent = "";
        return true;
    }

    function shakeButton() {
        loginButton.classList.remove("shake");
        void loginButton.offsetWidth;
        loginButton.classList.add("shake");
    }
});
</script>
</body>
</html>
